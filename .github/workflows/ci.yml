name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt offscreen system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Type-check (pyright, informational)
        continue-on-error: true
        run: |
          pip install pyright==1.1.410
          pyright
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build bundle
        run: python packaging/build.py
      # Bundle zu EINEM Archiv packen statt ~2047 Einzeldateien (Actions-Speicherkontingent).
      - name: Package bundle
        shell: pwsh
        run: Compress-Archive -Path dist/acc_viz/* -DestinationPath dist/acc_viz-windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acc_viz-windows
          path: dist/acc_viz-windows.zip
          if-no-files-found: error
          retention-days: 3
