name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt offscreen system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build bundle
        run: python packaging/build.py
      # Bundle zu EINEM Archiv packen: zuvor wurden ~2047 Einzeldateien je OS
      # hochgeladen, was das knappe Actions-Speicherkontingent gesprengt hat.
      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/acc_viz/* -DestinationPath dist/acc_viz-windows.zip
      - name: Package bundle (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r -q acc_viz-macos.zip acc_viz.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acc_viz-${{ matrix.os }}
          path: dist/acc_viz-*.zip
          if-no-files-found: ignore
          retention-days: 3
